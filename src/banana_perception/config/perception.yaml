/banana_perception:
  ros__parameters:
    image_topic: /camera/color/image_raw
    depth_topic: /camera/aligned_depth_to_color/image_raw   # 3D deproject용 정렬 뎁스
    camera_info_topic: /camera/color/camera_info            # intrinsics(fx,fy,cx,cy)
    command_topic: /banana/command
    detection_topic: /banana/detection
    model_path: models/best.pt          # 없으면 StubDetector 폴백
    conf_threshold: 0.5
    device: cuda:0                       # GPU 없으면 cpu
    # ⚠️ 학습 클래스 순서와 반드시 일치! (Roboflow export 순서 확인)
    classes: [unripe, ripe, overripe, rotten]
    # --- 3D / hand-eye ---
    base_frame: base_link                # grasp_pose 출력 프레임 (TF 목표)
    depth_scale: 0.001                   # 뎁스 16UC1(mm) → m
