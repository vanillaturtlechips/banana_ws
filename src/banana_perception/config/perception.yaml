/banana_perception:
  ros__parameters:
    image_topic: /camera/camera/color/image_raw   # realsense2_camera 기본 네임스페이스(camera/camera)
    command_topic: /banana/command
    detection_topic: /banana/detection
    model_path: /root/banana_ws/src/banana_perception/models/best.pt   # 절대경로(gitignore된 가중치)
    conf_threshold: 0.5
    device: cuda:0                       # GPU 없으면 cpu
    # ⚠️ 학습 클래스 순서와 반드시 일치! (Roboflow export 순서 확인)
    classes: [unripe, ripe, overripe, rotten]
