/banana_perception:
  ros__parameters:
    image_topic: /camera/camera/color/image_raw
    depth_topic: /camera/camera/aligned_depth_to_color/image_raw
    camera_info_topic: /camera/camera/color/camera_info
    command_topic: /banana/command
    detection_topic: /banana/detection
    model_path: /root/banana_ws/src/banana_perception/models/best.pt
    conf_threshold: 0.5
    device: cuda:0
    # ⚠️ 학습 클래스 순서와 반드시 일치!
    classes: [unripe, ripe, overripe, rotten]
    # --- 3D / hand-eye ---
    base_frame: base_link
    depth_scale: 0.001
